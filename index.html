<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Powerade Daily Leads Tracker · TREBEL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{
    --y:#fdf203; --bg:#161616; --panel:#202020; --panel2:#262626;
    --ink:#ffffff; --ink-dim:#b6b6b6; --line:#333333;
    --ok:#2fbf71; --warn:#ffbc00; --bad:#fc4343;
    --font:'Montserrat',-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:var(--font); background:var(--bg); color:var(--ink);
    min-height:100vh; padding-bottom:64px; -webkit-font-smoothing:antialiased;
  }
  .masthead{
    background:#000; border-bottom:4px solid var(--y);
    padding:26px 28px 22px 28px;
    display:flex; align-items:flex-end; justify-content:space-between; gap:16px; flex-wrap:wrap;
  }
  .brand-block .eyebrow{font-size:11px; letter-spacing:.22em; color:var(--y); font-weight:700; text-transform:uppercase;}
  .brand-block h1{font-size:clamp(20px,3.4vw,30px); font-weight:800; letter-spacing:-0.01em; margin-top:6px; text-transform:uppercase;}
  .updated{font-size:11px; color:var(--ink-dim); text-align:right;}
  .updated b{color:var(--ink); font-weight:600;}
  .live-dot{display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--ok); margin-right:6px; animation:pulse 2s infinite;}
  .live-dot.stale{background:var(--warn); animation:none;}
  @keyframes pulse{0%,100%{opacity:1;} 50%{opacity:.35;}}
  @media (prefers-reduced-motion:reduce){ .live-dot{animation:none;} }

  .goalstrip{background:#000; padding:0 28px 24px 28px;}
  .goalstrip .track{position:relative; height:34px; background:#1c1c1c; border:1px solid var(--line); border-radius:999px; overflow:hidden;}
  .goalstrip .fill{position:absolute; inset:0 auto 0 0; width:0%; background:var(--y); border-radius:999px; transition:width 1.1s cubic-bezier(.2,.8,.2,1);}
  .goalstrip .pct{position:absolute; inset:0; display:flex; align-items:center; padding:0 14px; font-weight:800; font-size:14px; color:#000;}
  .goalstrip .pct span{background:var(--y); padding:2px 10px; border-radius:999px;}
  .goalstrip .legend{display:flex; justify-content:space-between; margin-top:8px; font-size:11px; color:var(--ink-dim); letter-spacing:.06em; text-transform:uppercase;}
  @media (prefers-reduced-motion:reduce){ .goalstrip .fill{transition:none;} }

  .wrap{max-width:1100px; margin:0 auto; padding:26px 20px 0 20px;}
  .kpis{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px;}
  .kpi{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:14px 16px;}
  .kpi .label{font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-dim); font-weight:700;}
  .kpi .value{font-size:clamp(18px,2.6vw,26px); font-weight:800; margin-top:6px; font-variant-numeric:tabular-nums;}
  .kpi .sub{font-size:11px; color:var(--ink-dim); margin-top:3px;}
  .kpi.accent .value{color:var(--y);}
  .kpi .value.bad{color:var(--bad);} .kpi .value.ok{color:var(--ok);}

  .card{background:var(--panel); border:1px solid var(--line); border-radius:14px; margin-top:22px; overflow:hidden;}
  .card-head{display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; padding:16px 18px; border-bottom:1px solid var(--line);}
  .card-head h2{font-size:14px; font-weight:800; text-transform:uppercase; letter-spacing:.08em;}
  .card-head .hint{font-size:11px; color:var(--ink-dim);}
  .card-body{padding:18px;}
  .chart-box{position:relative; height:340px;}

  table{width:100%; border-collapse:collapse; font-size:13px; font-variant-numeric:tabular-nums;}
  thead th{text-align:left; font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-dim);
    padding:10px 14px; border-bottom:1px solid var(--line); position:sticky; top:0; background:var(--panel); z-index:1;}
  thead th.num, td.num{text-align:right;}
  tbody td{padding:9px 14px; border-bottom:1px solid #2a2a2a;}
  tbody tr:last-child td{border-bottom:none;}
  .dot{display:inline-block; width:10px; height:10px; border-radius:50%; margin-right:8px; vertical-align:middle;}
  tr.s-ok  td{background:rgba(47,191,113,.12);}  tr.s-ok  .dot{background:var(--ok);}   tr.s-ok  .comp{color:var(--ok); font-weight:700;}
  tr.s-warn td{background:rgba(255,188,0,.10);}  tr.s-warn .dot{background:var(--warn);} tr.s-warn .comp{color:var(--warn); font-weight:700;}
  tr.s-bad td{background:rgba(252,67,67,.10);}   tr.s-bad .dot{background:var(--bad);}   tr.s-bad .comp{color:var(--bad); font-weight:700;}
  .tablebox{max-height:480px; overflow:auto;}
  .tfoot{display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap;
    padding:12px 16px; border-top:1px solid var(--line); font-size:11px; color:var(--ink-dim);}

  .banner{
    margin-top:22px; background:rgba(255,188,0,.08); border:1px solid var(--warn);
    border-radius:12px; padding:14px 16px; font-size:12px; line-height:1.7; color:var(--ink);
  }
  .banner b{color:var(--warn);}
  .banner code{background:#000; padding:2px 6px; border-radius:5px; font-size:11px;}
  .loading{display:flex; align-items:center; gap:10px; justify-content:center; padding:70px 0; color:var(--ink-dim); font-size:13px;}
  .spin{width:16px; height:16px; border:2px solid var(--line); border-top-color:var(--y); border-radius:50%; animation:sp .9s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg);}}
  .hidden{display:none !important;}
</style>
</head>
<body>

<header class="masthead">
  <div class="brand-block">
    <div class="eyebrow">TREBEL × Powerade · MAX Mode Campaign</div>
    <h1>Daily Leads Tracker</h1>
  </div>
  <div class="updated"><span class="live-dot" id="liveDot"></span>Live from tracker sheet<br><b id="lastUpdated">—</b></div>
</header>

<div class="goalstrip">
  <div class="track" role="img" aria-label="Progress toward lead goal">
    <div class="fill" id="goalFill"></div>
    <div class="pct"><span id="goalPct">0%</span></div>
  </div>
  <div class="legend">
    <span id="legendLeft">Loading…</span>
    <span id="legendRight"></span>
  </div>
</div>

<div class="wrap">
  <div id="banner" class="banner hidden"></div>
  <div id="loading" class="loading"><div class="spin"></div> Fetching latest data from the sheet…</div>

  <div id="dash" class="hidden">
    <section class="kpis" id="kpiRow" aria-label="Key metrics"></section>

    <section class="card">
      <div class="card-head">
        <h2>Daily Valid Leads</h2>
        <span class="hint" id="chartHint"></span>
      </div>
      <div class="card-body">
        <div class="chart-box"><canvas id="chart" aria-label="Daily valid leads line chart"></canvas></div>
      </div>
    </section>

    <section class="card">
      <div class="card-head">
        <h2>Daily Results</h2>
        <span class="hint" id="tableHint"></span>
      </div>
      <div class="tablebox">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th class="num">Daily Goal</th>
              <th class="num">Valid Leads</th>
              <th class="num">Total Leads</th>
              <th class="num">Compliance</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <div class="tfoot">
        <span id="rowCount"></span>
        <span>Source: Google Sheet (published CSV) · refreshes on page load</span>
      </div>
    </section>
  </div>
</div>

<script>
(function(){
  // ============================================================
  // CONFIG — the only part you need to touch
  // ============================================================
  var CONFIG = {
    // "Publish to web" CSV URL for the "Daily Leads Tracker" tab.
    // Set in Google Sheets via: File → Share → Publish to web →
    // Daily Leads Tracker → CSV → Automatically republish ON.
    SHEET_CSV_URL: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSBuhzVDdJ85b1jR4uEnIgvRxULdZupfxP1vTuSeTVffMLy7DJIWdiVOsFmLeA20w7FK3pyQJFOoFeo/pub?gid=399790724&single=true&output=csv',

    GOAL: 250000,          // campaign total leads
    START: '2026-07-10',   // only count leads from this date onward
    DEADLINE: '2026-07-31',// delivery deadline (YYYY-MM-DD)
    DAILY_GOAL: null       // null = auto (GOAL ÷ days from START to DEADLINE).
                           // Put a number here to override.
  };
  // Expected DASHBOARD tab columns (header row required):
  // Date | Valid | Total     e.g.  6/11/26 | 14991 | 16670
  // ============================================================

  // Fallback data (from the sheet through Jul 12) — shown if the fetch fails
  // or before the CSV URL is configured.
  var FALLBACK = [
    ['2026-06-11',14991,16670],['2026-06-12',27656,30593],['2026-06-13',86,92],
    ['2026-06-14',10,10],['2026-06-15',0,0],['2026-06-16',0,0],['2026-06-17',0,0],
    ['2026-06-18',0,0],['2026-06-19',0,0],['2026-06-20',0,0],['2026-06-21',0,0],
    ['2026-06-22',0,0],['2026-06-23',0,0],['2026-06-24',0,0],['2026-06-25',0,0],
    ['2026-06-26',0,0],['2026-06-27',0,0],['2026-06-28',0,0],['2026-06-29',1645,1806],
    ['2026-06-30',7948,8684],['2026-07-01',7556,8283],['2026-07-02',6505,7200],
    ['2026-07-03',23,23],['2026-07-04',2,2],['2026-07-05',0,0],['2026-07-06',0,0],
    ['2026-07-07',3220,3593],['2026-07-08',2432,2704],['2026-07-09',8,9],
    ['2026-07-10',1,1],['2026-07-11',5882,6518],['2026-07-12',15115,16808]
  ].map(function(r){ return {date:r[0], valid:r[1], total:r[2]}; });

  var chart = null;

  // ---------- Helpers ----------
  function fmt(n){ return (n===null||n===undefined||isNaN(n)) ? '—' : Math.round(n).toLocaleString('en-US'); }
  function pct(n){ return (n===null||isNaN(n)) ? '—' : (Math.round(n*10)/10).toLocaleString('en-US')+'%'; }
  function pad(x){ x=String(parseInt(x,10)); return x.length===1 ? '0'+x : x; }
  function parseDateStr(s){
    s = String(s||'').trim();
    var m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
    if(m) return m[1]+'-'+pad(m[2])+'-'+pad(m[3]);
    m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
    if(m){ var y = m[3].length===2 ? '20'+m[3] : m[3]; return y+'-'+pad(m[1])+'-'+pad(m[2]); }
    return null;
  }
  function displayDate(iso){
    var p = iso.split('-');
    var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return months[parseInt(p[1],10)-1]+' '+parseInt(p[2],10)+', '+p[0];
  }
  function shortDate(iso){ var p=iso.split('-'); return parseInt(p[1],10)+'/'+parseInt(p[2],10); }
  function daysBetween(a,b){ return Math.round((new Date(b+'T00:00:00') - new Date(a+'T00:00:00'))/86400000); }
  function todayISO(){
    // Anchor "today" to Mexico City time so day math is consistent for all viewers
    var mx = new Date(new Date().toLocaleString('en-US', {timeZone:'America/Mexico_City'}));
    return mx.getFullYear()+'-'+pad(mx.getMonth()+1)+'-'+pad(mx.getDate());
  }
  function showBanner(html){ var b=document.getElementById('banner'); b.innerHTML=html; b.classList.remove('hidden'); }

  // ---------- CSV fetch + parse ----------
  function parseCSV(text){
    var rows=[], row=[], cur='', inQ=false;
    for(var i=0;i<text.length;i++){
      var c=text[i];
      if(inQ){
        if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else inQ=false; }
        else cur+=c;
      } else {
        if(c==='"') inQ=true;
        else if(c===','){ row.push(cur); cur=''; }
        else if(c==='\n'||c==='\r'){ if(c==='\r'&&text[i+1]==='\n') i++; row.push(cur); rows.push(row); row=[]; cur=''; }
        else cur+=c;
      }
    }
    if(cur.length||row.length){ row.push(cur); rows.push(row); }
    return rows;
  }

  function num(v){
    var n = parseInt(String(v||'').replace(/[^\d\-]/g,''),10);
    return isNaN(n) ? null : n;
  }

  function rowsFromCSV(csvRows){
    // Pass 1: find the header row (contains a cell exactly "Date" plus "Valid")
    // and map columns by name. Works on the raw tracker tab
    // (Date | Total Weekly | Valid | Total | ...) and on a clean 3-column tab.
    var headerIdx=-1, cD=0, cV=1, cT=2;
    for(var h=0; h<Math.min(csvRows.length,60); h++){
      var cells=csvRows[h].map(function(c){ return String(c||'').trim().toLowerCase(); });
      var di=cells.indexOf('date');
      if(di===-1) continue;
      var vi=cells.indexOf('valid');
      if(vi===-1) vi=cells.findIndex(function(c){ return /^valid( leads)?$/.test(c); });
      if(vi===-1) continue;
      var ti=-1;
      for(var k=0;k<cells.length;k++){
        if(cells[k]==='total' && k!==di && k!==vi){ ti=k; break; }
      }
      headerIdx=h; cD=di; cV=vi; cT=ti; break;
    }

    var today = todayISO();
    var start = headerIdx>-1 ? headerIdx+1 : 0;
    var out=[];
    for(var i=start;i<csvRows.length;i++){
      var r=csvRows[i];
      if(!r || !r.length) continue;
      var d=parseDateStr(r[cD]);
      if(!d || d>today) continue; // skip junk rows and future dates
      var rawV=String(r[cV]||'').trim();
      var v=num(rawV);
      var t=cT>-1 ? num(r[cT]) : null;
      out.push({date:d, valid:v===null?0:v, total:t, blank:rawV===''});
    }

    // Pass 2 (fallback): no usable header — scan for any column holding dates
    // and take the next non-percentage numbers as Valid / Total.
    if(!out.length){
      for(var col=0; col<3 && !out.length; col++){
        for(var j=0;j<csvRows.length;j++){
          var rr=csvRows[j]; if(!rr) continue;
          var dd=parseDateStr(rr[col]); if(!dd || dd>today) continue;
          var nums=[];
          for(var q=col+1;q<rr.length;q++){
            var nv=num(rr[q]);
            if(nv!==null && String(rr[q]).indexOf('%')===-1) nums.push(nv);
            if(nums.length>=2) break;
          }
          if(nums.length) out.push({date:dd, valid:nums[0]||0, total:nums[1]!==undefined?nums[1]:null, blank:false});
        }
      }
    }

    out.sort(function(a,b){ return a.date<b.date?-1:1; });
    var seen={};
    out = out.filter(function(r){ if(seen[r.date]) return false; seen[r.date]=1; return true; });
    // Trim trailing days not filled in yet (blank ≠ zero at the tail;
    // interior blanks stay 0, matching the paused-campaign days)
    while(out.length && out[out.length-1].blank){ out.pop(); }
    return out;
  }

  async function loadData(){
    if(!CONFIG.SHEET_CSV_URL){
      showBanner('<b>Setup needed:</b> this page is showing snapshot data. Publish the <code>DASHBOARD</code> tab of the tracker (File → Share → Publish to web → CSV) and paste the URL into <code>CONFIG.SHEET_CSV_URL</code> at the top of this file. After that, the page pulls live sheet data on every load.');
      document.getElementById('liveDot').classList.add('stale');
      return {rows:FALLBACK, live:false};
    }
    try{
      // cache-buster so viewers always get the freshest published copy
      var url = CONFIG.SHEET_CSV_URL + (CONFIG.SHEET_CSV_URL.indexOf('?')>-1?'&':'?') + 'cb=' + Date.now();
      var res = await fetch(url, {cache:'no-store'});
      if(!res.ok) throw new Error('HTTP '+res.status);
      var text = await res.text();
      var csvRows = parseCSV(text);
      var rows = rowsFromCSV(csvRows);
      if(!rows.length){
        // Diagnostic: report what the CSV actually looked like so the wrong-tab
        // case is obvious rather than mysterious.
        var firstCell='(empty)';
        for(var z=0; z<csvRows.length; z++){
          var hit=(csvRows[z]||[]).find(function(c){ return String(c||'').trim()!==''; });
          if(hit){ firstCell=String(hit).slice(0,60); break; }
        }
        showBanner('<b>Wrong tab.</b> The CSV loaded fine, but it has no Date/Valid columns — '
          +'this URL is serving a different tab. Its first cell reads: <code>'+firstCell+'</code>. '
          +'Publish the tracker tab specifically (add <code>&amp;gid=…&amp;single=true</code> to the URL). '
          +'Showing the built-in snapshot meanwhile.');
        document.getElementById('liveDot').classList.add('stale');
        return {rows:FALLBACK, live:false};
      }
      return {rows:rows, live:true};
    }catch(e){
      showBanner('<b>Could not reach the sheet</b> ('+ (e && e.message ? e.message : 'network error') +'). Showing the last built-in snapshot instead. Check that the tab is still published to the web.');
      document.getElementById('liveDot').classList.add('stale');
      return {rows:FALLBACK, live:false};
    }
  }

  // ---------- Render ----------
  function render(rows, live){
    var goal=CONFIG.GOAL, deadline=CONFIG.DEADLINE, start=CONFIG.START;
    // Daily goal: explicit override, or GOAL spread across the delivery window
    var windowDays = Math.max(daysBetween(start, deadline) + 1, 1);
    var dailyGoal = CONFIG.DAILY_GOAL !== null && !isNaN(CONFIG.DAILY_GOAL)
      ? CONFIG.DAILY_GOAL
      : Math.round(goal / windowDays);
    var totalValid = rows.reduce(function(t,r){ return t+(r.valid||0); },0);
    var pctGoal = goal>0 ? totalValid/goal*100 : null;
    var remaining = Math.max(goal-totalValid,0);
    var daysLeft = daysBetween(todayISO(), deadline);
    var deadlinePassed = daysLeft<0;
    var minDaily = daysLeft>0 ? remaining/daysLeft : null;
    var last7 = rows.slice(-7);
    var avg7 = last7.length ? last7.reduce(function(t,r){return t+(r.valid||0);},0)/last7.length : 0;

    document.getElementById('lastUpdated').textContent =
      new Date().toLocaleString('en-US',{timeZone:'America/Mexico_City',month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'})+' (CDMX)';

    var p = Math.min(pctGoal||0,100);
    document.getElementById('goalFill').style.width=p+'%';
    document.getElementById('goalPct').textContent=pct(pctGoal)+' of goal';
    document.getElementById('legendLeft').textContent=fmt(totalValid)+' valid leads since '+displayDate(start);
    document.getElementById('legendRight').textContent='Goal: '+fmt(goal)+' · Deadline: '+displayDate(deadline);

    var kpis=[
      {label:'Valid leads', value:fmt(totalValid), cls:'accent', sub:'since '+displayDate(start)},
      {label:'Goal', value:fmt(goal), sub:'campaign total'},
      {label:'Remaining', value:fmt(remaining), sub:'to reach goal'},
      {label:'Days to deadline', value: deadlinePassed ? Math.abs(daysLeft)+' past' : String(daysLeft),
        vcls: deadlinePassed?'bad':'', sub:displayDate(deadline)},
      {label:'Needed per day', value: minDaily===null?'—':fmt(minDaily), sub: deadlinePassed?'deadline passed':'to hit goal on time'},
      {label:'Last 7-day avg', value:fmt(avg7), vcls: avg7>=dailyGoal?'ok':'', sub:'valid leads / day'}
    ];
    document.getElementById('kpiRow').innerHTML = kpis.map(function(k){
      return '<div class="kpi '+(k.cls||'')+'"><div class="label">'+k.label+'</div>'
        +'<div class="value '+(k.vcls||'')+'">'+k.value+'</div>'
        +'<div class="sub">'+(k.sub||'')+'</div></div>';
    }).join('');

    var labels=rows.map(function(r){return shortDate(r.date);});
    var data=rows.map(function(r){return r.valid||0;});
    var goalLine=rows.map(function(){return dailyGoal;});
    document.getElementById('chartHint').textContent='Dashed line = daily goal ('+fmt(dailyGoal)+')';

    if(chart) chart.destroy();
    chart = new Chart(document.getElementById('chart').getContext('2d'),{
      type:'line',
      data:{labels:labels, datasets:[
        {label:'Valid leads', data:data, borderColor:'#fdf203', backgroundColor:'rgba(253,242,3,.08)',
         fill:true, tension:.25, pointRadius:2, pointHoverRadius:5, borderWidth:2},
        {label:'Daily goal', data:goalLine, borderColor:'#2fbf71', borderDash:[6,6],
         pointRadius:0, borderWidth:1.5, fill:false}
      ]},
      options:{
        responsive:true, maintainAspectRatio:false,
        interaction:{mode:'index', intersect:false},
        plugins:{
          legend:{labels:{color:'#b6b6b6', font:{family:"'Montserrat',sans-serif", size:11}, boxWidth:18}},
          tooltip:{backgroundColor:'#000', titleColor:'#fdf203', bodyColor:'#fff',
            callbacks:{label:function(c){return ' '+c.dataset.label+': '+fmt(c.parsed.y);}}}
        },
        scales:{
          x:{ticks:{color:'#b6b6b6', maxRotation:0, autoSkip:true, font:{size:10}}, grid:{color:'rgba(255,255,255,.05)'}},
          y:{beginAtZero:true, ticks:{color:'#b6b6b6', font:{size:10},
             callback:function(v){return v>=1000?(v/1000)+'K':v;}}, grid:{color:'rgba(255,255,255,.07)'}}
        }
      }
    });

    document.getElementById('tbody').innerHTML = rows.slice().reverse().map(function(r){
      var comp = dailyGoal>0 ? (r.valid||0)/dailyGoal*100 : 0;
      var cls = comp>=100?'s-ok':comp>=50?'s-warn':'s-bad';
      return '<tr class="'+cls+'"><td><span class="dot"></span>'+displayDate(r.date)+'</td>'
        +'<td class="num">'+fmt(dailyGoal)+'</td>'
        +'<td class="num">'+fmt(r.valid)+'</td>'
        +'<td class="num">'+(r.total?fmt(r.total):'—')+'</td>'
        +'<td class="num comp">'+Math.round(comp)+'%</td></tr>';
    }).join('');
    document.getElementById('rowCount').textContent = rows.length+' days tracked · '
      +displayDate(rows[0].date)+' – '+displayDate(rows[rows.length-1].date);
    document.getElementById('tableHint').textContent='Green ≥100% · Yellow 50–99% · Red <50% of daily goal';
  }

  // ---------- Init ----------
  (async function init(){
    var result = await loadData();
    // Only count days inside the delivery window
    var rows = result.rows.filter(function(r){ return r.date >= CONFIG.START; });
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('dash').classList.remove('hidden');
    if(!rows.length){
      showBanner('<b>No data in range.</b> The sheet has no rows on or after '
        +CONFIG.START+'. Check the <code>START</code> date in the CONFIG block.');
      return;
    }
    render(rows, result.live);
  })();
})();
</script>
</body>
</html>
